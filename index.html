            body,

                margin: 0;
                padding: 0;

                width: 100%;
                overflow: hidden;
                background-color: white;
            }
            .container {
                display: flex;
                height: 100vh;
                width: 100vw;
            }

            /* Layout Columns */
            .column {
                flex: 1;
                overflow-y: auto;
                padding: 40px;
                scrollbar-width: none;
            }
            .column::-webkit-scrollbar {
                display: none;
            }
            .image-col {
                flex: 2;
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
            }

    
            .word-list span {
                display: flex;
                align-items: center;
                height: 120px; /* Vertical spacing for each line */
                width: 100%;
                margin-bottom: 20px;
            }
.word-list img {
    max-width: 100%;
    height: auto;
    max-height: 100px;
    display: block;
    object-fit: fixed;
}

            .arabic-col .word-list span {
                justify-content: flex-end;
            }
            .english-col .word-list span {
                justify-content: flex-start;
            }

            /* Hover Image Logic */
            .hover-image {
                position: fixed;
                max-width: 30%;
                opacity: 0;
                transition: opacity 0.3s;
                pointer-events: none;
            }
            .hover-image.active {
                opacity: 1;
            }
        </style>

        <script>
            const ca = document.getElementById("col-arabic");
            const ce = document.getElementById("col-english");

            // 1:1 Scroll Sync
            ca.onscroll = () => {
                ce.scrollTop = ca.scrollTop;
            };
            ce.onscroll = () => {
                ca.scrollTop = ce.scrollTop;
            };

            // Hover Interaction
            document.addEventListener("mouseover", (e) => {
                const pair = e.target.closest("span[data-pair]");
                if (pair) {
                    const id = pair.getAttribute("data-pair");
                    document.getElementById(`img-${id}`)?.classList.add("active");
                }
            });

            document.addEventListener("mouseout", (e) => {
                if (e.target.closest("span[data-pair]")) {
                    document.querySelectorAll(".hover-image").forEach((img) => img.classList.remove("active"));
                }
            });
        </script>
